name: Release RocDex APK

on:
  push:
    tags:
      - 'v.1.0.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Node dependencies
        run: pnpm install --ignore-scripts

      - name: Build frontend and CLI
        run: pnpm run build

      - name: Copy build artifacts to Android assets
        run: |
          ANDROID_ASSETS="android/app/src/main/assets/server-bundle"
          rm -rf "$ANDROID_ASSETS"
          mkdir -p "$ANDROID_ASSETS/dist"
          mkdir -p "$ANDROID_ASSETS/dist-cli"
          cp -r dist/* "$ANDROID_ASSETS/dist/"
          cp -r dist-cli/* "$ANDROID_ASSETS/dist-cli/"
          cp package.json "$ANDROID_ASSETS/package.json"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/release/app-release.apk "RocDex-v${VERSION}.apk"

      - name: Get tag name
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "RocDex ${{ env.TAG }}"
          body: |
            ## RocDex APK Release
            
            - Version: ${{ env.TAG }}
            - Build: Automatic from GitHub Actions
          files: RocDex-*.apk
          draft: false
          prerelease: false
